version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fridge-backend
    restart: always

  fridge-backend:
    build: 
      context: ./fridge-manager
    expose:
      - "3000"
    restart: always
