server {
    listen 80;
    server_name localhost;

    # The root directory containing all example apps
    root /usr/share/nginx/html;

    # Redirect root to the landing page
    location = / {
        return 301 /landing-page/;
    }

    # Serve static files for frontend apps
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API requests to the Node.js backend (Fridge Manager)
    location /api/ {
        proxy_pass http://fridge-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
